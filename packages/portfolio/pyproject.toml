[build-system]
requires = ["setuptools>=65"]
build-backend = "setuptools.build_meta"

[project]
name = "portfolio"
version = "0.1.0"
description = "Portfolio book models and classification logic for Yield OS"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0", "asset-registry"]

[tool.setuptools]
packages = ["portfolio"]
package-dir = {"portfolio" = "."}
