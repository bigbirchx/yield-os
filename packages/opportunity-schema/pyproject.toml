[build-system]
requires = ["setuptools>=65"]
build-backend = "setuptools.build_meta"

[project]
name = "opportunity-schema"
version = "0.1.0"
description = "Unified yield opportunity schema for Yield OS"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0"]

# The directory is named opportunity-schema (hyphen) but Python imports it as
# opportunity_schema (underscore).  package-dir maps the importable name to ".".
[tool.setuptools]
packages = ["opportunity_schema"]
package-dir = {"opportunity_schema" = "."}
